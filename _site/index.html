<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Diego Origami Group — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      text-align: center;
      padding: 2rem;
    }
    .crane {
      width: clamp(80px, 15vw, 140px);
      margin: 0 auto 2rem;
      opacity: 0.3;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 300;
      color: #222;
      line-height: 1.05;
      margin-bottom: 1rem;
    }
    h1 em { font-style: italic; color: #888; }
    p {
      font-size: 1rem;
      color: #888;
      max-width: 380px;
      margin: 0 auto 2rem;
      line-height: 1.8;
    }
    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #aaa;
      display: block;
      margin-bottom: 1rem;
    }
    a {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      text-decoration: none;
    }
    a:hover { color: #222; border-color: #222; }
  </style>
</head>
<body>
  <div>
    <div class="crane" aria-hidden="true">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <polygon points="100,20 160,80 130,85 100,60" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
        <polygon points="100,20 40,80 70,85 100,60" fill="rgba(0,0,0,0.05)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
        <polygon points="100,60 70,85 100,140 130,85" fill="rgba(0,0,0,0.1)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
        <polygon points="70,85 20,110 100,140" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
        <polygon points="130,85 180,110 100,140" fill="rgba(0,0,0,0.06)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
        <polygon points="100,140 90,180 110,180" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
      </svg>
    </div>
    <span class="eyebrow">San Diego, California</span>
    <h1>Something beautiful<br><em>is folding.</em></h1>
    <p>The Greater San Diego Origami Group is coming soon. Check back shortly.</p>
    <a href="mailto:sdorigami.site@gmail.com">Get in touch</a>
  </div>
</body>
</html>
